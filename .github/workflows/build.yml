name: Build & Release

on:
  workflow_dispatch:        # manual trigger from GitHub UI
  push:
    branches:
      - main               # runs CI on every merge to main
    tags:
      - 'v*'               # auto-triggers on any v0.9.2, v1.0.0, etc.

jobs:
  # ── Build on all three platforms in parallel ────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: CyberSurvivor-Windows
          - os: ubuntu-latest
            artifact: CyberSurvivor-Linux
          - os: macos-latest
            artifact: CyberSurvivor-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux needs SDL2 headers so pygame installs its native libs correctly
      - name: Install Linux SDL2 libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev libsdl2-ttf-dev \
            libfreetype6-dev libportmidi-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # Read VERSION from settings.py without importing the full game package
      - name: Read version
        id: ver
        shell: python
        run: |
          import os
          with open("src/settings.py") as f:
              for line in f:
                  if line.startswith("VERSION"):
                      ver = line.split('"')[1]
                      with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                          out.write(f"value={ver}\n")
                      break

      - name: Inject Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        shell: python
        run: |
          import os, json
          url = os.environ.get('SUPABASE_URL', '')
          key = os.environ.get('SUPABASE_ANON_KEY', '')
          if url and key:
              with open('src/secrets.py', 'w') as f:
                  f.write(f'SUPABASE_URL = {json.dumps(url)}\n')
                  f.write(f'SUPABASE_ANON_KEY = {json.dumps(key)}\n')
              print('secrets.py written')
          else:
              print('No Supabase secrets configured — skipping')

      - name: Build with PyInstaller
        run: pyinstaller cyber_survivor.spec --clean --noconfirm

      - name: Package — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          Compress-Archive
          -Path dist/CyberSurvivor/*
          -DestinationPath "${{ matrix.artifact }}-v${{ steps.ver.outputs.value }}.zip"

      - name: Package — Linux / macOS
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r "../${{ matrix.artifact }}-v${{ steps.ver.outputs.value }}.zip" CyberSurvivor/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: "${{ matrix.artifact }}-v${{ steps.ver.outputs.value }}.zip"

  # ── Create a GitHub Release when a version tag is pushed ────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true   # puts all zips in the working directory

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

  # ── Publish to itch.io via butler ────────────────────────────────────────────
  publish-itch:
    needs: [build]
    # Run on tag pushes, manual dispatch, OR any push to main
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Install butler
        run: |
          curl -L -o butler.zip \
            "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          unzip butler.zip
          chmod +x butler
          ./butler version

      - name: Push all channels
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          # Extract version from any zip filename
          VER=$(basename $(ls dist/*.zip | head -1) .zip | grep -oP 'v[\d.]+')
          echo "Detected version: $VER"

          for ZIP in dist/CyberSurvivor-Windows-*.zip; do
            echo "Pushing Windows: $ZIP"
            ./butler push "$ZIP" tylertech/cyber-survivor:windows-stable \
              --userversion "$VER"
          done

          for ZIP in dist/CyberSurvivor-Linux-*.zip; do
            echo "Pushing Linux: $ZIP"
            ./butler push "$ZIP" tylertech/cyber-survivor:linux-stable \
              --userversion "$VER"
          done

          for ZIP in dist/CyberSurvivor-macOS-*.zip; do
            echo "Pushing macOS: $ZIP"
            ./butler push "$ZIP" tylertech/cyber-survivor:osx-stable \
              --userversion "$VER"
          done
